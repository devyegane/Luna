<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A.S.T.R.A</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">


<section id="boot" class="screen active">

<h1>A.S.T.R.A</h1>

<h3>
Artificial Synaptic Tracking & Reconstruction Assistant
</h3>

<div id="bootText"></div>

<div id="progressBar">
<div id="progress"></div>
</div>

<button id="bootBtn">
INITIALIZE SYSTEM
</button>

</section>



<section id="scan" class="screen">

<h2>System Scan</h2>

<div id="scanText"></div>

<button class="next">
Continue
</button>

</section>



<section id="archive" class="screen">

<h2>Unknown Archive</h2>

<div id="archiveText"></div>

<button class="next">
Continue
</button>

</section>



<section id="files" class="screen">

<h2>Recovered Files</h2>

<div class="folder">📁 Memory_01</div>
<div class="folder">📁 Memory_02</div>
<div class="folder">📁 Memory_03</div>
<div class="folder">📁 Memory_04</div>
<div class="folder">🔒 Locked_File</div>

<div class="folder" onclick="openLore()">
📄 LORE.txt
</div>

</section>




<section id="decrypt" class="screen">

<h2>Access Required</h2>

<input id="code" placeholder="ENTER KEY">

<button id="unlock">
Unlock
</button>

</section>




<section id="ai" class="screen">

<h2>A.S.T.R.A</h2>

<div id="aiText"></div>

<button id="continueAI">
Continue
</button>

</section>




<section id="final" class="screen">

<h1>
MISSION COMPLETE
</h1>

<div id="finalText"></div>

<button id="gift">
🎁 OPEN GIFT
</button>

</section>



</div>



<!-- SOUND -->

<audio id="bgSound" loop>

<source src="sound.mp3" type="audio/mp3">

</audio>



<script src="script.js"></script>

</body>
</html>
